name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Check Python syntax / imports compile
        run: python -m compileall backend/app

      - name: Run tests
        run: |
          if find backend -type f -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pip install pytest
            pytest backend
          else
            echo "No backend tests yet — skipping pytest run."
          fi

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
        # No npm cache here: actions/setup-node hard-fails if cache-dependency-path
        # doesn't resolve to a real lock file, and frontend/ has no package-lock.json
        # committed yet (only `npm install` has been run, never `npm ci`/lockfile
        # commit). Re-add `cache: npm` + cache-dependency-path once a lockfile exists.

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
